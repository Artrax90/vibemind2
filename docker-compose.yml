services:
  app:
    build: .
    image: artrax/vibemind:latest
    container_name: vibemind_app
    ports:
      - "3344:3344"
    volumes:
      - vibemind_storage:/app/storage
    environment:
      - DATABASE_URL=postgresql://vibemind:vibemind@db:5432/vibemind
      - REDIS_URL=redis://redis:6379/0
      - ENCRYPTION_KEY=super-secret-default-key-change-me-later-123
      - TZ=Europe/Moscow
      - STT_HOST=vosk
      - STT_PORT=10300
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      vosk:
        condition: service_started

  db:
    image: ankane/pgvector:v0.5.1
    container_name: vibemind_db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=vibemind
      - POSTGRES_PASSWORD=vibemind
      - POSTGRES_DB=vibemind
    volumes:
      - vibemind_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibemind -d vibemind"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: vibemind_redis
    restart: always

  vosk-model-download:
    image: alpine
    container_name: vosk_model_download
    volumes:
      - ./vosk-model:/data
    command: >
      sh -c "
      set -e;
      if [ ! -d '/data/vosk-model-small-ru-0.22' ]; then
        echo '--- Step 1: Installing dependencies ---';
        apk add --no-cache wget unzip ca-certificates;
        echo '--- Step 2: Downloading model ---';
        # Попробуем разные источники с проверкой размера
        SUCCESS=false;
        for url in \
          'https://alphacephei.com/vosk/models/vosk-model-small-ru-0.22.zip' \
          'https://github.com/alphacep/vosk-model-small-ru/archive/refs/heads/master.zip' \
          'https://github.com/alphacep/vosk-model-small-ru/archive/refs/heads/main.zip';
        do
          echo \"Trying URL: \$$url\";
          rm -f /data/model.zip;
          if wget -4 -q --show-progress --no-check-certificate --user-agent='Mozilla/5.0' \"\$$url\" -O /data/model.zip; then
            SIZE=\$$(stat -c%s /data/model.zip);
            if [ \$$SIZE -gt 1000000 ]; then
              echo \"Download successful (\$$SIZE bytes)!\";
              SUCCESS=true;
              break;
            else
              echo \"File too small (\$$SIZE bytes), skipping...\";
            fi
          fi
        done;

        if [ \"\$$SUCCESS\" = \"false\" ]; then
          echo 'CRITICAL: All download sources failed.';
          exit 1;
        fi

        echo '--- Step 3: Unzipping and organizing ---';
        unzip -q /data/model.zip -d /data/;
        # GitHub пакует в папку с названием ветки
        if [ -d '/data/vosk-model-small-ru-master' ]; then
          mv /data/vosk-model-small-ru-master /data/vosk-model-small-ru-0.22;
        elif [ -d '/data/vosk-model-small-ru-main' ]; then
          mv /data/vosk-model-small-ru-main /data/vosk-model-small-ru-0.22;
        fi
        rm -f /data/model.zip;
        echo '--- Step 4: Done! ---';
      else
        echo '--- Model already exists, skipping ---';
      fi
      "

  vosk:
    image: rhasspy/wyoming-vosk
    container_name: wyoming-vosk
    restart: unless-stopped
    depends_on:
      vosk-model-download:
        condition: service_completed_successfully
    ports:
      - "10300:10300"
    volumes:
      - ./vosk-model:/data
    command:
      - --model
      - /data/vosk-model-small-ru-0.22
      - --uri
      - tcp://0.0.0.0:10300
      - --data-dir
      - /data

volumes:
  vibemind_db_data:
  vibemind_storage:
