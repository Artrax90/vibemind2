services:
  app:
    build: .
    image: artrax/vibemind:latest
    container_name: vibemind_app
    ports:
      - "3344:3344"
    volumes:
      - vibemind_storage:/app/storage
    environment:
      - DATABASE_URL=postgresql://vibemind:vibemind@db:5432/vibemind
      - REDIS_URL=redis://redis:6379/0
      - ENCRYPTION_KEY=super-secret-default-key-change-me-later-123
      - TZ=Europe/Moscow
      - STT_HOST=vosk
      - STT_PORT=10300
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      vosk:
        condition: service_started

  db:
    image: ankane/pgvector:v0.5.1
    container_name: vibemind_db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=vibemind
      - POSTGRES_PASSWORD=vibemind
      - POSTGRES_DB=vibemind
    volumes:
      - vibemind_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibemind -d vibemind"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: vibemind_redis
    restart: always

  vosk-model-download:
    image: alpine
    container_name: vosk_model_download
    volumes:
      - ./vosk-model:/data
    command: >
      sh -c "
      set -e;
      TARGET_DIR='/data/vosk-model-small-ru-0.22';
      if [ ! -d \"\$$TARGET_DIR\" ]; then
        echo '--- Step 1: Installing dependencies ---';
        apk add --no-cache curl unzip ca-certificates;
        echo '--- Step 2: Downloading model with auto-resume ---';
        MAX_RETRIES=20;
        COUNT=0;
        while [ \$$COUNT -lt \$$MAX_RETRIES ]; do
          echo \"Attempt \$$((COUNT+1)) of \$$MAX_RETRIES...\";
          if curl -4 -L -C - --connect-timeout 15 --speed-time 30 --speed-limit 1024 https://alphacephei.com/vosk/models/vosk-model-small-ru-0.22.zip -o /data/model.zip; then
            echo 'Download command finished, checking integrity...';
            if unzip -t /data/model.zip > /dev/null 2>&1; then
              echo 'File is valid!';
              break;
            else
              echo 'File is incomplete or corrupted, will retry...';
            fi
          else
            echo 'Curl failed or timed out, retrying in 5s...';
          fi
          COUNT=\$$((COUNT+1));
          sleep 5;
        done;
        if [ \$$COUNT -eq \$$MAX_RETRIES ]; then echo 'CRITICAL: Failed to download model after 20 attempts'; exit 1; fi
        echo '--- Step 3: Unzipping model ---';
        unzip -o /data/model.zip -d /data/;
        rm /data/model.zip;
        echo '--- Step 4: Done! ---';
      else
        echo '--- Model already exists, skipping ---';
      fi
      "

  vosk:
    image: rhasspy/wyoming-vosk
    container_name: wyoming-vosk
    restart: unless-stopped
    depends_on:
      vosk-model-download:
        condition: service_completed_successfully
    ports:
      - "10300:10300"
    volumes:
      - ./vosk-model:/data
    command:
      - --model
      - /data/vosk-model-small-ru-0.22
      - --uri
      - tcp://0.0.0.0:10300
      - --data-dir
      - /data

volumes:
  vibemind_db_data:
  vibemind_storage:
