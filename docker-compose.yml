version: "3.9"

services:
  app:
    build: .
    image: artrax/vibemind:latest
    container_name: vibemind_app
    ports:
      - "3344:3344"
    volumes:
      - vibemind_storage:/app/storage
    environment:
      - DATABASE_URL=postgresql://vibemind:vibemind@db:5432/vibemind
      - REDIS_URL=redis://redis:6379/0
      - ENCRYPTION_KEY=super-secret-default-key-change-me-later-123
      - TZ=Europe/Moscow
      - STT_HOST=vosk
      - STT_PORT=10300
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      vosk:
        condition: service_started

  db:
    image: ankane/pgvector:v0.5.1
    container_name: vibemind_db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=vibemind
      - POSTGRES_PASSWORD=vibemind
      - POSTGRES_DB=vibemind
    volumes:
      - vibemind_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibemind -d vibemind"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: vibemind_redis
    restart: always

  vosk-model-download:
    image: curlimages/curl:8.5.0
    container_name: vosk_model_download
    volumes:
      - ./vosk-model:/data
    entrypoint: ["/bin/sh", "-c"]
    command: |
      set -e

      mkdir -p /data

      if [ -d "/data/vosk-model-small-ru-0.22" ]; then
        echo "Model already exists"
        exit 0
      fi

      echo "Downloading model..."

      curl -L --fail https://alphacephei.com/vosk/models/vosk-model-small-ru-0.22.zip -o /data/model.zip

      echo "Installing unzip..."
      apk add --no-cache unzip >/dev/null 2>&1 || true

      echo "Unzipping..."
      unzip /data/model.zip -d /data/

      rm /data/model.zip

      echo "Done!"

  vosk:
    image: rhasspy/wyoming-vosk
    container_name: wyoming-vosk
    restart: unless-stopped
    depends_on:
      vosk-model-download:
        condition: service_completed_successfully
    ports:
      - "10300:10300"
    volumes:
      - ./vosk-model:/data
    command:
      - --uri
      - tcp://0.0.0.0:10300
      - --data-dir
      - /data
      - --language
      - ru

volumes:
  vibemind_db_data:
  vibemind_storage:
